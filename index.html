<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Кэшбэк Ассистент</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --bg-card: #1e293b; --bg-input: #1e293b; --bg-overlay: rgba(0,0,0,0.6);
      --text: #f1f5f9; --text-sec: #94a3b8; --text-muted: #64748b;
      --border: #334155; --border-hi: #475569;
      --green: #22c55e; --green-dim: #16a34a; --red: #ef4444; --yellow: #eab308; --lime: #84cc16;
      --radius: 12px; --radius-sm: 8px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --header-bg: rgba(15,23,42,0.88); --tab-bg: rgba(15,23,42,0.92);
      --stroke-color: rgba(255,255,255,0.3); --shadow-color: rgba(0,0,0,0.7);
    }
    html.light {
      --bg: #f1f5f9; --bg-card: #ffffff; --bg-input: #ffffff; --bg-overlay: rgba(0,0,0,0.4);
      --text: #1e293b; --text-sec: #64748b; --text-muted: #94a3b8;
      --border: #e2e8f0; --border-hi: #cbd5e1;
      --header-bg: rgba(241,245,249,0.88); --tab-bg: rgba(241,245,249,0.92);
      --stroke-color: rgba(0,0,0,0.15); --shadow-color: rgba(255,255,255,0.8);
    }
    html { font-family: var(--font); background: var(--bg); color: var(--text); }
    body { min-height: 100vh; -webkit-font-smoothing: antialiased; padding-bottom: env(safe-area-inset-bottom, 0); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 40;
      background: var(--header-bg); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-actions { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

    /* ── Bottom Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--tab-bg); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; padding: 6px 8px;
      padding-bottom: max(6px, env(safe-area-inset-bottom, 6px));
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      padding: 8px 4px 6px; border: none; border-radius: 10px;
      font-size: 11px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--text-muted);
      transition: all 0.15s; font-family: var(--font);
    }
    .tab-btn svg { width: 22px; height: 22px; }
    .tab-btn.active { color: var(--green); background: rgba(34,197,94,0.08); }
    .tab-btn:not(.active):hover { color: var(--text-sec); }

    /* ── Main ── */
    .main { max-width: 900px; margin: 0 auto; padding: 16px 12px 90px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px; border-radius: var(--radius-sm); border: none;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: all 0.15s ease; white-space: nowrap;
      background: transparent; color: var(--text-sec);
      font-family: var(--font); min-height: 40px;
    }
    .btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-primary { background: var(--green); color: #fff; font-weight: 600; }
    .btn-primary:hover { background: var(--green-dim); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.05); }
    .btn-danger { color: var(--red); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-icon { padding: 8px; width: 40px; height: 40px; }
    .btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Bank Card Icon (CSS) ── */
    .card-icon {
      width: 40px; height: 26px; border-radius: 5px; position: relative;
      background: var(--bank-color, #64748b); box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      flex-shrink: 0; overflow: hidden;
    }
    .card-icon::before {
      content: ''; position: absolute; top: 4px; left: 6px;
      width: 14px; height: 10px; border-radius: 2px;
      background: rgba(255,255,255,0.25);
    }
    .card-icon::after {
      content: ''; position: absolute; bottom: 4px; right: 5px;
      width: 14px; height: 9px; border-radius: 3px 3px 4px 4px;
      background: rgba(255,255,255,0.35);
    }
    .card-icon.white-card { background: #cbd5e1; }
    .card-icon.white-card::before { background: rgba(0,0,0,0.06); }
    .card-icon.white-card::after { background: rgba(0,0,0,0.08); }
    /* Light text chip for yellow cards */
    .card-icon.dark-chip::before { background: rgba(0,0,0,0.12); }
    .card-icon.dark-chip::after { background: rgba(0,0,0,0.08); }

    /* ── Selected List ── */
    .sel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .sel-title { font-size: 15px; font-weight: 600; color: var(--text-sec); }
    .sel-count { font-size: 13px; color: var(--text-muted); }
    .sel-group { margin-bottom: 20px; }
    .sel-group-letter {
      font-size: 13px; font-weight: 700; color: var(--text-muted);
      padding: 8px 4px 4px; letter-spacing: 1px;
    }
    .sel-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border-radius: var(--radius-sm);
      background: var(--bg-card); border: 1px solid var(--border);
      margin-bottom: 6px; transition: border-color 0.15s;
    }
    .sel-item:hover { border-color: var(--border-hi); }
    .sel-item-info { flex: 1; min-width: 0; }
    .sel-item-cat { font-size: 15px; font-weight: 500; }
    .sel-item-bank-row { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
    .sel-item-bank { font-size: 14px; font-weight: 800; -webkit-text-stroke: 0.5px var(--stroke-color); text-shadow: 0 1px 4px var(--shadow-color); }
    .sel-item-pct { font-size: 20px; font-weight: 900; flex-shrink: 0; -webkit-text-stroke: 0.4px var(--stroke-color); text-shadow: 0 1px 4px var(--shadow-color); }
    .sel-item-limit { font-size: 11px; color: var(--text-muted); }
    .sel-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 60px 20px; gap: 12px; text-align: center;
    }
    .sel-empty svg { color: var(--text-muted); opacity: 0.3; }
    .sel-empty p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

    /* ── Bank Cards Grid ── */
    .bank-grid { display: grid; gap: 14px; grid-template-columns: 1fr; }
    .bank-card {
      background: var(--bg-card); border: 2px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: all 0.2s ease;
    }
    .bank-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .bank-card.selected { border-color: color-mix(in srgb, var(--bank-color, var(--green)) 40%, transparent); }
    .bank-card.expanded { border-color: var(--bank-color, var(--green)); box-shadow: 0 0 20px color-mix(in srgb, var(--bank-color, var(--green)) 15%, transparent); }
    .bc-header { padding: 14px 16px; }
    .bc-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .bc-info { min-width: 0; flex: 1; display: flex; align-items: flex-start; gap: 12px; }
    .bc-text { min-width: 0; flex: 1; }
    .bc-name { font-size: 16px; font-weight: 600; }
    .bc-website {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 12px; color: var(--text-muted); text-decoration: none;
      margin-top: 3px; transition: color 0.15s;
    }
    .bc-website:hover { color: var(--bank-color, var(--green)); }
    .bc-website svg { width: 12px; height: 12px; }
    .bc-desc { font-size: 12px; color: var(--text-muted); margin-top: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .bc-count { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .bc-actions { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px;
      font-size: 11px; font-weight: 600; color: #fff;
    }
    .badge svg { width: 13px; height: 13px; }
    .rec-badge {
      background: #eab308; color: #000; font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 4px; margin-left: 6px;
      letter-spacing: 0.5px;
    }

    /* ── Categories ── */
    .categories { padding: 0 16px 16px; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 14px; }
    .categories-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .categories-month { font-size: 14px; font-weight: 500; }
    .categories-list { max-height: 65vh; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }

    /* ── Category Row (larger for touch) ── */
    .cat-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); transition: all 0.15s ease;
      cursor: pointer;
    }
    .cat-row:hover { border-color: var(--border-hi); }
    .cat-row.checked {
      background: color-mix(in srgb, var(--bank-color, var(--green)) 6%, transparent);
      border-color: color-mix(in srgb, var(--bank-color, var(--green)) 35%, transparent);
    }
    .cat-row.recommended {
      border-left: 3px solid #eab308;
    }
    .cat-row.recommended.checked {
      border-left: 3px solid #eab308;
    }
    .cat-checkbox {
      width: 24px; height: 24px; border-radius: 6px; flex-shrink: 0;
      border: 2px solid var(--border-hi); display: flex;
      align-items: center; justify-content: center; transition: all 0.15s;
    }
    .cat-row.checked .cat-checkbox {
      background: var(--bank-color, var(--green)); border-color: var(--bank-color, var(--green));
    }
    .cat-checkbox svg { width: 16px; height: 16px; color: #fff; opacity: 0; }
    .cat-row.checked .cat-checkbox svg { opacity: 1; }
    .cat-info { flex: 1; min-width: 0; }
    .cat-name { font-size: 15px; font-weight: 500; color: var(--text-muted); transition: color 0.15s; }
    .cat-row.checked .cat-name { color: var(--text); }
    .cat-details { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
    .cat-percent { font-size: 16px; font-weight: 700; }
    .cat-percent.high { color: var(--green); }
    .cat-percent.mid { color: #4ade80; }
    .cat-percent.low { color: var(--lime); }
    .cat-percent.lowest { color: var(--yellow); }
    .cat-limit {
      font-size: 11px; color: var(--text-muted);
      background: rgba(255,255,255,0.06); padding: 2px 8px; border-radius: 4px;
    }
    .cat-note-toggle {
      padding: 6px; width: 34px; height: 34px; border: none;
      background: transparent; color: var(--text-muted); cursor: pointer;
      border-radius: 6px; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .cat-note-toggle:hover { background: rgba(255,255,255,0.06); }
    .cat-note-toggle svg { width: 18px; height: 18px; }
    .cat-notes-box { padding: 4px 14px 12px 50px; display: flex; flex-direction: column; gap: 4px; }
    .cat-note-text { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
    .cat-note-link {
      font-size: 12px; color: var(--bank-color, var(--green)); text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .cat-note-link:hover { text-decoration: underline; }
    .cat-note-link svg { width: 12px; height: 12px; }

    /* ── Empty ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 80px 20px; gap: 16px; text-align: center;
    }
    .empty svg { color: var(--text-muted); opacity: 0.3; }
    .empty p { font-size: 14px; color: var(--text-muted); }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0; z-index: 100;
      background: var(--bg-overlay); display: flex;
      align-items: center; justify-content: center; padding: 16px;
      animation: fadeIn 0.15s ease;
    }
    .overlay.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); width: 100%; max-width: 440px;
      max-height: 90vh; overflow-y: auto;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { padding: 20px 20px 0; }
    .modal-title { font-size: 17px; font-weight: 600; }
    .modal-desc { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .modal-body { padding: 16px 20px; }
    .modal-footer { padding: 12px 20px 20px; display: flex; justify-content: flex-end; gap: 8px; }

    .tabs {
      display: flex; gap: 4px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-sm); padding: 4px; margin-bottom: 12px;
    }
    .tab {
      flex: 1; padding: 10px; border: none; border-radius: 6px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      background: transparent; color: var(--text-muted);
      transition: all 0.15s; display: flex; align-items: center;
      justify-content: center; gap: 6px; font-family: var(--font);
    }
    .tab:hover { color: var(--text); }
    .tab.active { background: var(--green); color: #fff; }
    .tab svg { width: 16px; height: 16px; }

    .upload-zone {
      border: 2px dashed var(--border); border-radius: var(--radius-sm);
      padding: 32px 16px; text-align: center; cursor: pointer;
      transition: border-color 0.15s;
    }
    .upload-zone:hover { border-color: rgba(34,197,94,0.5); }
    .upload-zone svg { margin: 0 auto 8px; color: var(--text-muted); }
    .upload-zone p { font-size: 13px; color: var(--text-muted); }

    .textarea {
      width: 100%; min-height: 150px; padding: 12px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-size: 13px; font-family: 'SF Mono', Monaco, monospace;
      resize: vertical; outline: none;
    }
    .textarea:focus { border-color: var(--green); }
    .textarea::placeholder { color: var(--text-muted); }
    .error-text { font-size: 13px; color: var(--red); margin-top: 8px; }

    .action-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); cursor: pointer;
      text-align: left; width: 100%; background: transparent;
      color: var(--text); transition: all 0.15s; font-family: var(--font);
    }
    .action-card:hover { border-color: var(--border-hi); background: rgba(255,255,255,0.03); }
    .action-card svg { flex-shrink: 0; margin-top: 2px; }
    .action-card-title { font-size: 14px; font-weight: 500; }
    .action-card-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* ── Tab Panels ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Responsive ── */
    @media (min-width: 641px) {
      .bank-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
      .bank-grid.has-expanded { grid-template-columns: 1fr; }
      .sel-item { padding: 12px 16px; }
    }
    @media (max-width: 480px) {
      .header-title { font-size: 16px; }
      .bc-name { font-size: 15px; }
      .btn-icon { width: 36px; height: 36px; padding: 6px; }
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: var(--bg-card); border: 1px solid var(--border);
      color: var(--text); padding: 10px 20px; border-radius: var(--radius-sm);
      font-size: 13px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      animation: toastIn 0.2s ease, toastOut 0.3s ease 2.7s forwards;
      pointer-events: none; white-space: nowrap;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-row">
      <div class="header-title" id="headerTitle" onclick="easterEggTap()">Кэшбэк Ассистент</div>
      <div class="header-actions">
        <button class="btn btn-icon" onclick="toggleTheme()" title="Сменить тему" id="themeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIconMoon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="themeIconSun" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button class="btn btn-icon" onclick="exportBackup()" title="Экспорт">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <button class="btn btn-icon" onclick="importBackup()" title="Восстановить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn btn-icon btn-danger" onclick="openClearModal()" title="Очистить">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="main" id="app"></main>

  <!-- ── Bottom Tab Bar ── -->
  <nav class="tab-bar">
    <button class="tab-btn active" id="tabSelected" onclick="switchTab('selected')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Выбранное</span>
    </button>
    <button class="tab-btn" id="tabBanks" onclick="switchTab('banks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
      <span>Банки</span>
    </button>
  </nav>

  <!-- ── Import COIN Modal ── -->
  <div class="overlay hidden" id="importModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">Импорт COIN файла</div>
        <div class="modal-desc">Загрузите файл COIN 2.0 или вставьте JSON текст</div>
      </div>
      <div class="modal-body">
        <div class="tabs">
          <button class="tab active" id="tabFile" onclick="switchImportTab('file')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Файл
          </button>

let _tapCount = 0, _tapTimer = null;
function easterEggTap() {
  _tapCount++;

  if (_tapCount >= 7) {
    _tapCount = 0;
    // Get SW cache version
    if (navigator.serviceWorker && navigator.serviceWorker.controller) {
      navigator.serviceWorker.controller.postMessage('getVersion');

    navigator.serviceWorker.addEventListener('message', function handler(e) {
      if (e.data && e.data.version) {
        showToast('⚙ v' + e.data.version);
        navigator.serviceWorker.removeEventListener('message', handler);
      }
    });
  }
}

function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const el = document.createElement('div');

// ─── Recommendation Algorithm ──────────────────────────────────────────────────

function getMaxCategories(bank) {
  const notes = bank.coinData.notes || [];
  for (const note of notes) {
    const m = note.note.match(/можно выбрать\s+(\d+)\s+из/);
    if (m) return parseInt(m[1]);
  }
  return 5;
}

function getAlwaysActiveCats(bank) {
  const result = [];
  const notes = bank.coinData.notes || [];
  for (const note of notes) {
    if (note.note.toLowerCase().includes('всегда действующий')) {
      for (const entry of bank.coinData.cashback.entries) {
        if ((entry.notes || []).includes(note.id)) result.push(entry.category);
      }
    }
  }
  return result;
}

function calculateRecommendation() {
  const bankCaps = {}, bankUsed = {}, alwaysActive = {};
  for (const bank of banks) {
    bankCaps[bank.id] = getMaxCategories(bank);
    bankUsed[bank.id] = new Set(getAlwaysActiveCats(bank));
    alwaysActive[bank.id] = new Set(getAlwaysActiveCats(bank));
  }
  const catGroups = {};
  for (const bank of banks) {
    for (const entry of bank.coinData.cashback.entries) {
      if (!catGroups[entry.category]) catGroups[entry.category] = [];
      catGroups[entry.category].push({ bankId: bank.id, percent: entry.percent });
    }
  }
  for (const cat of Object.keys(catGroups)) catGroups[cat].sort((a, b) => b.percent - a.percent);
  const sortedCats = Object.entries(catGroups).map(([name, opts]) => ({ name, opts, maxPct: opts[0].percent })).sort((a, b) => b.maxPct - a.maxPct);
  for (const { name, opts } of sortedCats) {
    if (opts.every(o => alwaysActive[o.bankId]?.has(name))) continue;
    for (const opt of opts) {
      const discUsed = bankUsed[opt.bankId].size - alwaysActive[opt.bankId].size;
      if (discUsed < bankCaps[opt.bankId]) { bankUsed[opt.bankId].add(name); break; }
    }
  }
  return bankUsed;
}

let _cachedRecommendation = null;
function getRecommendation() { if (!_cachedRecommendation) _cachedRecommendation = calculateRecommendation(); return _cachedRecommendation; }
function invalidateRecommendation() { _cachedRecommendation = null; }

    app.innerHTML = '<div class="empty"><div style="width:64px;height:64px">' + ICONS.download + '</div><p>Нет добавленных банков</p><button class="btn btn-primary" onclick="openImportModal()" style="gap:8px"><span style="width:18px;height:18px">' + ICONS.plus + '</span>Импорт COIN</button></div>';
    return;
  }
  if (currentTab === 'selected') renderSelected(app);
  else renderBanks(app);
}

// ─── Render: Selected Panel ─────────────────────────────────────────────────────
function renderSelected(app) {
  // Collect all selected categories from all banks
  const items = [];
  for (const bank of banks) {
    const bc = getBankColor(bank.coinData.provider.name);
    for (const catName of bank.selectedCategories) {
      const entry = bank.coinData.cashback.entries.find(e => e.category === catName);
      if (!entry) continue;
      items.push({
        category: entry.category,
        percent: entry.percent,
        limit: entry.limit,
        bankName: bank.coinData.provider.name,
        bankColor: bc.color,
        bankId: bank.id,
      });
    }
  }

  // Sort alphabetically by category, then by bank name
  items.sort((a, b) => {
    const cmp = a.category.localeCompare(b.category, 'ru');
    return cmp !== 0 ? cmp : a.bankName.localeCompare(b.bankName, 'ru');
  });

  if (items.length === 0) {
    app.innerHTML = '<div class="sel-empty"><div style="width:56px;height:56px">' + ICONS.check + '</div><p>Нет выбранных категорий.<br>Перейдите на вкладку «Банки», чтобы выбрать категории кэшбэка.</p></div>';
    return;
  }

  // Group by first letter
  const groups = {};
  for (const item of items) {
    const letter = item.category[0].toUpperCase();
    if (!groups[letter]) groups[letter] = [];
    groups[letter].push(item);
  }

  let html = '<div class="sel-header"><span class="sel-title">Выбранные категории</span><span class="sel-count">' + items.length + ' шт.</span></div>';

  for (const [letter, gItems] of Object.entries(groups)) {
    html += '<div class="sel-group">';
    html += '<div class="sel-group-letter">' + escHtml(letter) + '</div>';
    for (const item of gItems) {
      const isWhite = item.bankColor === DEFAULT_COLOR.color;
      const cardCls = 'card-icon' + (isWhite ? ' white-card' : '');
      html += '<div class="sel-item">';
      html += renderCardIcon(item.bankName);
      html += '<div class="sel-item-info"><div class="sel-item-cat">' + escHtml(item.category) + '</div>';
      html += '<div class="sel-item-bank-row"><span class="sel-item-bank" style="' + bankColorStyle(item.bankName) + '">' + escHtml(item.bankName) + '</span>';
      if (item.limit !== undefined) {
        html += '<span class="sel-item-limit">до ' + item.limit.toLocaleString('ru-RU') + ' ₽</span>';
      }
      html += '</div></div>';
      html += '<span class="sel-item-pct" style="' + bankColorStyle(item.bankName) + '">' + item.percent + '%</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  app.innerHTML = html;
}

// ─── Render: Banks Panel ────────────────────────────────────────────────────────
function renderBanks(app) {
  const isExpanded = expandedBankId !== null;
  let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">';
  html += '<span style="font-size:15px;color:var(--text-sec)">Банковские карты</span>';
  html += '<button class="btn btn-primary btn-sm" onclick="openImportModal()" style="gap:6px;min-height:36px;padding:6px 12px;font-size:13px"><span style="width:16px;height:16px">' + ICONS.download + '</span>COIN</button>';
  html += '</div>';
  html += '<div class="bank-grid' + (isExpanded ? ' has-expanded' : '') + '">';

  for (const bank of banks) {
    const isExp = expandedBankId === bank.id;
    const selCount = bank.selectedCategories.length;
    const totalCount = bank.coinData.cashback.entries.length;
    const bc = getBankColor(bank.coinData.provider.name);
    const isWhite = bc.color === DEFAULT_COLOR.color;
    const notesMap = {};
    (bank.coinData.notes || []).forEach(n => { notesMap[n.id] = n.note; });
    const linksMap = {};
    (bank.coinData.links || []).forEach(l => { linksMap[l.id] = l.link; });

    const cardCls = 'bank-card' + (selCount > 0 ? ' selected' : '') + (isExp ? ' expanded' : '');
    html += '<div class="' + cardCls + '" style="--bank-color:' + bc.color + '">';
    html += '<div class="bc-header"><div class="bc-row"><div class="bc-info">';
    html += renderCardIcon(bank.coinData.provider.name);
    html += '<div class="bc-text">';
    html += '<div class="bc-name">' + escHtml(bank.coinData.provider.name) + '</div>';
    if (bank.coinData.provider.website) {
      html += '<a href="' + escHtml(bank.coinData.provider.website) + '" target="_blank" rel="noopener noreferrer" class="bc-website"><span style="width:12px;height:12px">' + ICONS.extLink + '</span><span>' + escHtml(bank.coinData.provider.website.replace(/^https?:\/\//, '')) + '</span></a>';
    }
    if (bank.coinData.provider.notes) {
      html += '<div class="bc-desc">' + escHtml(bank.coinData.provider.notes) + '</div>';
    }
    html += '<div class="bc-count">' + selCount + ' / ' + totalCount + '</div>';
    html += '</div></div><div class="bc-actions">';
    if (selCount > 0) {
      html += '<span class="badge" style="background:' + bc.color + '"><span style="width:13px;height:13px">' + ICONS.check + '</span>' + selCount + '</span>';
    }
    html += '<button class="btn' + (isExp ? ' btn-primary' : ' btn-outline') + ' btn-sm" onclick="toggleExpand(\'' + bank.id + '\')" style="gap:5px;min-height:36px;padding:6px 12px;font-size:13px"><span style="width:16px;height:16px">' + (isExp ? ICONS.chevUp : ICONS.chevDown) + '</span>' + (isExp ? 'Свернуть' : 'Выбрать') + '</button>';
    html += '<button class="btn btn-sm btn-danger btn-icon" onclick="deleteBank(\'' + bank.id + '\')" title="Удалить" style="min-height:36px"><span style="width:16px;height:16px">' + ICONS.trash + '</span></button>';
    html += '</div></div></div>';

    if (isExp) {
      const rec = getRecommendation()[bank.id] || new Set();
      html += '<div class="categories">';
      html += '<div class="categories-header"><span class="categories-month">' + formatMonth(bank.month) + '</span>';
      html += '<button class="btn btn-sm btn-outline" onclick="newMonth(\'' + bank.id + '\')" style="gap:5px;min-height:36px;padding:6px 12px;font-size:13px"><span style="width:14px;height:14px">' + ICONS.refresh + '</span>Новый месяц</button>';
      html += '</div><div class="categories-list">';

      for (const entry of [...bank.coinData.cashback.entries].sort((a, b) => b.percent - a.percent)) {
        const isSel = bank.selectedCategories.includes(entry.category);
        const isRec = rec.has(entry.category);
        const entryNotes = (entry.notes || []).map(nid => notesMap[nid]).filter(Boolean);
        const entryLinks = (entry.links || []).map(lid => linksMap[lid]).filter(Boolean);
        const escCat = escHtml(entry.category).replace(/'/g, "\\'");

        html += '<div class="cat-row' + (isSel ? ' checked' : '') + (isRec ? ' recommended' : '') + '" onclick="toggleCat(\'' + bank.id + '\',\'' + escCat + '\')">';
        html += '<div class="cat-checkbox">' + ICONS.check + '</div>';
        html += '<div class="cat-info"><div class="cat-name">' + escHtml(entry.category) + (isRec ? ' <span style="width:13px;height:13px;vertical-align:middle;margin-left:2px">' + ICONS.bolt + '</span>' : '') + '</div>';
        html += '<div class="cat-details"><span class="cat-percent ' + percentClass(entry.percent) + '">' + entry.percent + '%</span>';
        if (entry.limit !== undefined) {
          html += '<span class="cat-limit">до ' + entry.limit.toLocaleString('ru-RU') + ' ₽/мес</span>';
        }
        html += '</div></div>';
        if (entryNotes.length > 0 || entryLinks.length > 0) {
          html += '<button class="cat-note-toggle" onclick="event.stopPropagation();toggleNotes(this)"><span style="width:18px;height:18px">' + ICONS.chevDown + '</span></button>';
        }
        html += '</div>';
        if (entryNotes.length > 0 || entryLinks.length > 0) {
          html += '<div class="cat-notes-box" style="display:none">';
          for (const note of entryNotes) html += '<div class="cat-note-text">💡 ' + escHtml(note) + '</div>';
          for (const link of entryLinks) html += '<a href="' + escHtml(link) + '" target="_blank" rel="noopener noreferrer" class="cat-note-link"><span style="width:12px;height:12px">' + ICONS.extLink + '</span>' + escHtml(link) + '</a>';
          html += '</div>';
        }
      }
      html += '</div></div>';
    }
    html += '</div>';
  }
  html += '</div>';
  app.innerHTML = html;
}

// ─── Actions ────────────────────────────────────────────────────────────────────
function saveScroll() {
  const el = document.querySelector('.categories-list');
  return el ? el.scrollTop : 0;
}

function restoreScroll(pos) {
  if (pos <= 0) return;
  requestAnimationFrame(() => {
    const el = document.querySelector('.categories-list');
    if (el) el.scrollTop = pos;
  });
}

function toggleCat(bankId, category) {
  const scrollPos = saveScroll();
  const bank = banks.find(b => b.id === bankId);
  if (!bank) return;
  const idx = bank.selectedCategories.indexOf(category);
  if (idx >= 0) bank.selectedCategories.splice(idx, 1);
  else bank.selectedCategories.push(category);
  bank.updatedAt = new Date().toISOString();
  invalidateRecommendation();
  saveData(); render();
  restoreScroll(scrollPos);
}

function toggleExpand(bankId) {
  expandedBankId = expandedBankId === bankId ? null : bankId;
  render();
}

function newMonth(bankId) {
  const bank = banks.find(b => b.id === bankId);
  if (!bank) return;
  bank.selectedCategories = [];
  bank.month = getCurrentMonth();
  bank.updatedAt = new Date().toISOString();
  saveData(); render();
}

function deleteBank(bankId) {
  banks = banks.filter(b => b.id !== bankId);
  if (expandedBankId === bankId) expandedBankId = null;
  saveData(); render();
}

function toggleNotes(btn) {
  const box = btn.parentElement.nextElementSibling;
  if (!box || !box.classList.contains('cat-notes-box')) return;
  const shown = box.style.display !== 'none';
  box.style.display = shown ? 'none' : 'flex';
  btn.innerHTML = '<span style="width:18px;height:18px">' + (shown ? ICONS.chevDown : ICONS.chevUp) + '</span>';
}

// ─── Import COIN ────────────────────────────────────────────────────────────────
function openImportModal() {
  document.getElementById('importModal').classList.remove('hidden');
  document.getElementById('importError').classList.add('hidden');
  document.getElementById('pasteText').value = '';
  switchImportTab('file');
}
function closeImportModal() { document.getElementById('importModal').classList.add('hidden'); }
function switchImportTab(mode) {
  document.getElementById('tabFile').classList.toggle('active', mode === 'file');
  document.getElementById('tabPaste').classList.toggle('active', mode === 'paste');
  document.getElementById('importFileZone').style.display = mode === 'file' ? '' : 'none';
  document.getElementById('importPasteZone').style.display = mode === 'paste' ? '' : 'none';
  document.getElementById('importError').classList.add('hidden');
}
function showImportError(msg) { const el = document.getElementById('importError'); el.textContent = msg; el.classList.remove('hidden'); }

function processImport(coinData) {
  const v = validateCoin(coinData);
  if (!v.valid) { showImportError(v.error); return; }
  const existing = banks.find(b => b.coinData.provider.name === coinData.provider.name);
  if (existing) {
    pendingCoinData = coinData;
    closeImportModal();
    document.getElementById('dupBankName').textContent = 'Банк «' + coinData.provider.name + '» уже добавлен.';
    document.getElementById('duplicateModal').classList.remove('hidden');
  } else { addBank(coinData); closeImportModal(); }
}

function addBank(coinData, keepSelections, oldBank) {
  const now = new Date().toISOString();
  const bank = { id: genId(), coinData, selectedCategories: [], addedAt: now, updatedAt: now, month: getCurrentMonth() };
  if (keepSelections && oldBank) {
    bank.selectedCategories = oldBank.selectedCategories.filter(cat => {
      const o = oldBank.coinData.cashback.entries.find(e => e.category === cat);
      const n = coinData.cashback.entries.find(e => e.category === cat);
      return o && n && o.percent === n.percent;
    });
  }
  banks.push(bank); saveData(); render();
}

function handleDuplicate(action) {
  if (!pendingCoinData || action === 'cancel') { pendingCoinData = null; document.getElementById('duplicateModal').classList.add('hidden'); return; }
  const existing = banks.find(b => b.coinData.provider.name === pendingCoinData.provider.name);
  if (action === 'replace') { banks = banks.filter(b => b.coinData.provider.name !== pendingCoinData.provider.name); addBank(pendingCoinData, false, null); }
  else if (action === 'keep' && existing) { banks = banks.filter(b => b.coinData.provider.name !== pendingCoinData.provider.name); addBank(pendingCoinData, true, existing); }
  pendingCoinData = null;
  document.getElementById('duplicateModal').classList.add('hidden');
}

function handleFileUpload(event) {
  const file = event.target.files && event.target.files[0]; if (!file) return;
  document.getElementById('importError').classList.add('hidden');
  const reader = new FileReader();
  reader.onload = function(e) { try { processImport(JSON.parse(e.target.result)); } catch(err) { showImportError('Не удалось прочитать файл.'); } };
  reader.readAsText(file); event.target.value = '';
}

function handlePasteImport() {
  const text = document.getElementById('pasteText').value.trim();
  if (!text) { showImportError('Вставьте JSON текст'); return; }
  try { processImport(JSON.parse(text)); } catch(err) { showImportError('Неверный формат JSON'); }
}

// ─── Export / Import Backup ─────────────────────────────────────────────────────
function exportBackup() {
  const blob = new Blob([JSON.stringify({ banks }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cashback-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function importBackup() {
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files && e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.banks && Array.isArray(data.banks)) {
          for (const bank of data.banks) { const v = validateCoin(bank.coinData); if (!v.valid) { alert('Ошибка: ' + v.error); return; } }
          banks = data.banks; saveData(); expandedBankId = null; render();
        } else alert('Неверный формат файла');
      } catch(err) { alert('Не удалось прочитать файл'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── Clear ──────────────────────────────────────────────────────────────────────
function openClearModal() { document.getElementById('clearModal').classList.remove('hidden'); }
function closeClearModal() { document.getElementById('clearModal').classList.add('hidden'); }
function clearAll() { banks = []; expandedBankId = null; localStorage.removeItem(STORAGE_KEY); closeClearModal(); render(); }

// ─── Close modals on overlay click ──────────────────────────────────────────────
document.querySelectorAll('.overlay').forEach(overlay => {
  overlay.addEventListener('click', function(e) { if (e.target === this) { this.classList.add('hidden'); pendingCoinData = null; } });
});

// ─── Init ───────────────────────────────────────────────────────────────────────
(function init() {
  initTheme();
  const stored = loadData();
  if (stored) { banks = stored; }
  else {
    const month = getCurrentMonth(); const now = new Date().toISOString();
    banks = EMBEDDED_COINS.map(data => {
      const v = validateCoin(data); if (!v.valid) return null;
      return { id: genId(), coinData: data, selectedCategories: [], addedAt: now, updatedAt: now, month };
    }).filter(Boolean);
    saveData();
  }
  render();
})();
</script>
